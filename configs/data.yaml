# configs/data.yaml
# Data paths + loader settings. The model trains on SIM and evaluates zero-shot on REAL.

image_size: 224                 # square; must match model.yaml image_size (keeps 14x14=196 grid)

# ---- Dataset selection ----
# 'synthetic' = random-tensor stub so the whole pipeline runs before real data exists.
#               Switch to 'sim' once the loader is wired.
dataset: sim                    # {synthetic, sim}

synthetic:
  num_samples: 256              # how many fake samples the stub serves
  num_objects: 8                # fake object ids (used by the object-wise split)

sim:
  root: /media/hdd2/ihsuan/gs_blender/renders
  rgb_subdir: rgb               # <unit>/rgb/<idx>.png
  use_gt_depth: true            # load *_gt.npy (clean GT) vs *.npy (with noise)
  # Object-wise train/val split (held-out objects = the sim "val"). Real eval is separate.
  val_objects: [edge, hex_key, pattern_31_rod]

# ---- Real eval set (sim2real, reported zero-shot) ----
real:
  root: null                    # real captures, same per-sample fields as sim
  rgb_subdir: rgb

# ---- DataLoader ----
loader:
  num_workers: 8
  pin_memory: true
  prefetch_factor: 4
  persistent_workers: true

# ---- Normalization ----
# RGB + tactile images go through ImageNet normalization for the DINOv3 encoder.
# Depth and normals are NOT image-normalized (depth is raw float32 from .npy;
# normals are computed from depth as unit vectors in [-1,1]).
norm:
  imagenet_mean: [123.675, 116.28, 103.53]
  imagenet_std:  [58.395, 57.12, 57.375]
